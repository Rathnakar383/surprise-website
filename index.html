<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for My Love ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary-pink: #ffafbd;
            --deep-rose: #ffc3a0;
            --soft-purple: #ee9ca7;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--soft-purple), var(--primary-pink));
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a4a4a;
        }

        /* Background Floating Hearts */
        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hidden { display: none !important; }

        /* Step 1: Login */
        h2 { font-family: 'Dancing Script', cursive; font-size: 2rem; margin-bottom: 20px; color: #d63384; }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid var(--primary-pink);
            border-radius: 25px;
            outline: none;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        button:hover { background: #ff758f; transform: scale(1.05); }

        /* Step 2: Letter */
        #letter-text { font-size: 1.1rem; line-height: 1.6; color: #555; }

        /* Step 3: Cake */
        .cake { font-size: 80px; cursor: pointer; transition: 0.5s; }
        .cake.blown { opacity: 0.5; filter: grayscale(1); }

        /* Audio Controls */
        .music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="heart-bg" id="heart-bg"></div>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Romantic-Guitar-Music.mp3" type="audio/mpeg">
    </audio>
    <div class="music-toggle" onclick="toggleMusic()">🎵</div>

    <div class="container" id="main-card">
        
        <div id="page1">
            <h2>Hey Love 💕</h2>
            <p style="margin-bottom: 20px;">I have something special for you... Enter our secret code to unlock your surprise 🎁</p>
            <input type="password" id="secretCode" placeholder="Our special date or word?">
            <br>
            <button onclick="checkCode()">Unlock</button>
            <p id="error-msg" style="color: #ff4d6d; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
        </div>

        <div id="page2" class="hidden">
            <h2>For You... ❤️</h2>
            <div id="typed-text"></div>
            <button id="next-btn" class="hidden" style="margin-top: 20px;" onclick="goToCake()">Next Surprise ✨</button>
        </div>

        <div id="page3" class="hidden">
            <h2 id="final-wish">Make a Wish! 🎂</h2>
            <div class="cake" id="cake" onclick="blowCandle()">🎂</div>
            <p id="instruction">Tap the cake to blow out the candles!</p>
            <div id="final-message" class="hidden">
                <p>Happy Birthday, Beautiful! 🎈</p>
                <p style="font-size: 0.9rem; margin-top: 15px;">This is just a small surprise to remind you how much I love you. See you soon! ❤️</p>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let musicPlaying = false;

        // 1. Music Toggle
        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            musicPlaying = !musicPlaying;
        }

        // 2. Heart Background Animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '110vh';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.opacity = Math.random();
            document.getElementById('heart-bg').appendChild(heart);

            gsap.to(heart, {
                y: '-120vh',
                x: (Math.random() - 0.5) * 200,
                duration: Math.random() * 3 + 3,
                ease: "power1.out",
                onComplete: () => heart.remove()
            });
        }
        setInterval(createHeart, 400);

        // 3. Logic: Page 1 to Page 2
        function checkCode() {
            const code = document.getElementById('secretCode').value.toLowerCase();
            const correctCode = "love"; // <-- CHANGE THIS to your secret word or date

            if(code === correctCode) {
                gsap.to("#page1", {opacity: 0, duration: 0.5, onComplete: () => {
                    document.getElementById('page1').classList.add('hidden');
                    document.getElementById('page2').classList.remove('hidden');
                    startTypewriter();
                }});
            } else {
                const error = document.getElementById('error-msg');
                error.innerText = "Oops 😝 That’s not our special code… Try again my love!";
                error.style.display = "block";
            }
        }

        // 4. Logic: Typewriter Letter
        function startTypewriter() {
            new Typed('#typed-text', {
                strings: [
                    "Happy Birthday, my love ❤️<br><br>From the moment you came into my life, everything became brighter and more beautiful.<br><br>You are my happiness, my peace, and my safe place.<br><br>Today is your day, but you make every day of my life special 💕"
                ],
                typeSpeed: 50,
                showCursor: false,
                onComplete: () => {
                    document.getElementById('next-btn').classList.remove('hidden');
                }
            });
        }

        // 5. Logic: Page 2 to Page 3
        function goToCake() {
            gsap.to("#page2", {opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('page3').classList.remove('hidden');
            }});
        }

        // 6. Logic: Blow Candle
        function blowCandle() {
            const cake = document.getElementById('cake');
            cake.classList.add('blown');
            document.getElementById('instruction').classList.add('hidden');
            document.getElementById('final-wish').innerText = "Hooray! 🎉";
            document.getElementById('final-message').classList.remove('hidden');

            // Confetti Explosion
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d6d', '#ffafbd']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d6d', '#ffafbd']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
