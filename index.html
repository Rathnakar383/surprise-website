<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for My Fav Person ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            background: linear-gradient(-45deg, #ee9ca7, #ffafbd, #2f0743, #41295a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            position: relative;
            z-index: 10;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hidden { display: none !important; }

        h2 { 
            font-family: 'Dancing Script', cursive; 
            font-size: 3rem; 
            margin-bottom: 20px; 
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 85%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            outline: none;
            text-align: center;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            position: relative;
            min-height: 60px;
        }

        button {
            background: #fff;
            color: #d63384;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        #no-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid var(--glass-border);
        }

        #typed-text { font-size: 1.1rem; min-height: 150px; text-align: left; padding: 0 10px; line-height: 1.7; }

        .cake { font-size: 110px; cursor: pointer; transition: transform 0.3s ease; }
        .cake.blown { filter: grayscale(1) opacity(0.5); transform: scale(0.85); }

        .music-toggle {
            position: fixed;
            bottom: 30px; right: 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--glass-border);
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="heart-bg" id="heart-bg"></div>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Romantic-Guitar-Music.mp3" type="audio/mpeg">
    </audio>
    <div class="music-toggle" onclick="toggleMusic()">🎵</div>

    <div class="container" id="main-card">
        <div id="page1">
            <h2>Hey beautiful💕</h2>
            <p style="margin-bottom: 25px;">Enter our secret code to unlock your surprise 🎁</p>
            <input type="password" id="secretCode" placeholder="Enter code here...">
            <br>
            <button onclick="checkCode()">Unlock Experience</button>
            <p id="error-msg" style="display: none; color: #ffd6d6; font-size: 0.85rem; margin-top: 15px;"></p>
        </div>

        <div id="page2" class="hidden">
            <h2 style="font-size: 2.2rem;">Wait... ✋❤️</h2>
            <p style="margin-bottom: 10px;">Do you wanna see your birthday surprise wishes?</p>
            <div class="btn-group">
                <button onclick="goToLetter()">Yes ❤️</button>
                <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">No 💔</button>
            </div>
        </div>

        <div id="page3" class="hidden">
            <h2>For You... ❤️</h2>
            <div id="typed-text"></div>
            <button id="next-btn" class="hidden" style="margin-top: 25px;" onclick="goToCake()">Next Surprise ✨</button>
        </div>

        <div id="page4" class="hidden">
            <h2 id="final-wish">Make a Wish!</h2>
            <div class="cake" id="cake" onclick="blowCandle()">🎂</div>
            <p id="instruction" style="margin-top: 20px; opacity: 0.8;">Tap the cake to blow out the candles</p>
            <div id="final-message" class="hidden" style="margin-top: 20px;">
                <p style="font-size: 1.3rem; font-weight: 600;">Happy Birthday,Cutiepie! 🎈</p>
                <p style="font-size: 0.95rem; margin-top: 10px;">Once again happiest blessed bday papa❤️💕. See you soon! ❤️</p>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let musicPlaying = false;

        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => console.log("Blocked"));
            }
            musicPlaying = !musicPlaying;
        }

        function createHearts() {
            const el = document.createElement('div');
            el.innerHTML = Math.random() > 0.5 ? '❤️' : '✨';
            el.style.position = 'absolute';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '110vh';
            el.style.fontSize = Math.random() * 20 + 10 + 'px';
            el.style.opacity = Math.random() * 0.5;
            el.style.pointerEvents = 'none';
            document.getElementById('heart-bg').appendChild(el);
            gsap.to(el, { y: '-120vh', x: (Math.random()-0.5)*200, duration: Math.random()*5+5, onComplete: () => el.remove() });
        }
        setInterval(createHearts, 400);

        function checkCode() {
            if(document.getElementById('secretCode').value === "150408") {
                // START MUSIC ON SUCCESSFUL INTERACTION
                audio.play().catch(e => console.log("Audio Play Failed"));
                musicPlaying = true;

                gsap.to("#page1", { opacity: 0, scale: 0.9, duration: 0.5, onComplete: () => {
                    document.getElementById('page1').classList.add('hidden');
                    document.getElementById('page2').classList.remove('hidden');
                    gsap.from("#page2", { opacity: 0, y: 30, duration: 0.6 });
                }});
            } else {
                const err = document.getElementById('error-msg');
                err.innerText = "Oops! Wrong code Digna papa! 😝";
                err.style.display = "block";
                gsap.fromTo("#secretCode", {x: -10}, {x: 10, duration: 0.1, repeat: 5, yoyo: true});
            }
        }

        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            const randomX = (Math.random() - 0.5) * 250;
            const randomY = (Math.random() - 0.5) * 250;
            gsap.to(noBtn, { x: randomX, y: randomY, duration: 0.3, ease: "power2.out" });
        }

        function goToLetter() {
            gsap.to("#page2", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('page3').classList.remove('hidden');
                new Typed('#typed-text', {
                    strings: ["Happy Birthday, beautiful!❤️<br><br>To the most beautiful gurl in the world, you make everything brighter.<br><br>No matter where life takes us, I'll always wish the best for you.<br><br>Today is your day, enjoy the day, mentalloo 💕"],
                    typeSpeed: 45, showCursor: false,
                    onComplete: () => {
                        document.getElementById('next-btn').classList.remove('hidden');
                    }
                });
            }});
        }

        function goToCake() {
            gsap.to("#page3", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('page3').classList.add('hidden');
                document.getElementById('page4').classList.remove('hidden');
            }});
        }

        function blowCandle() {
            document.getElementById('cake').classList.add('blown');
            document.getElementById('instruction').style.opacity = '0';
            document.getElementById('final-wish').innerText = "Hooray! 🎉";
            document.getElementById('final-message').classList.remove('hidden');
            
            const end = Date.now() + 4000;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0 } });
                confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
